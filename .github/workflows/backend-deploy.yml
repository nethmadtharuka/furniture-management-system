name: Backend — Build & Deploy to Azure

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/furniture/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/furniture/**'

env:
  IMAGE_NAME: suhada-backend

jobs:
  # ── 1. Build & Test ───────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./backend/furniture
        run: mvn test -B

      - name: Build JAR
        working-directory: ./backend/furniture
        run: mvn clean package -DskipTests -B

  # ── 2. Docker Build & Push to ACR ────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: ./backend/furniture
        run: mvn clean package -DskipTests -B