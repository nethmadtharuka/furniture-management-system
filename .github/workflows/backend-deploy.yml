name: Backend — Build & Deploy to Azure

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/furniture/**'
      - '.github/workflows/backend-deploy.yml'

env:
  IMAGE_NAME: suhada-backend

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: ./backend/furniture
        run: mvn clean package -DskipTests -B

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/furniture
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Restart Azure Web App
        run: |
          curl -s -X POST \
            "https://management.azure.com/subscriptions/c05fe108-d78a-4f9e-be27-79dfc93e6aec/resourceGroups/suhada-furniture-rg/providers/Microsoft.Web/sites/suhada-furniture-api/restart?api-version=2022-03-01" \
            -H "Authorization: Bearer $(curl -s 'http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/' -H 'Metadata: true' | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"access_token\"])')" \
            -H "Content-Length: 0"