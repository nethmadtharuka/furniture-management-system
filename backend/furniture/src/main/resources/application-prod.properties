# ============================================================
# application-prod.properties
# Place in: backend/src/main/resources/application-prod.properties
# ALL secrets injected from Azure App Service Environment Variables
# ============================================================

# ??? Server ?????????????????????????????????????????????????
server.port=8080

# ??? Database (Azure MySQL Flexible Server) ??????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ??? JPA ????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# ??? JWT ????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ??? File Upload ????????????????????????????????????????????
# NOTE: Keeping uploads on local disk as per your choice.
# Files in the 'uploads/' folder will persist within the container's
# filesystem. You are managing storage separately.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

file.upload-dir=/home/uploads
# This must point to your Azure App Service's public domain at runtime
file.base-url=${FILE_BASE_URL}

# ??? Email ??????????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.from=Suhada Furniture <noreply@suhada.com>

# ??? Gemini AI ??????????????????????????????????????????????
gemini.api.key=${GEMINI_API_KEY}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.model.text=gemini-2.0-flash
gemini.model.vision=gemini-2.0-flash-preview-image-generation
gemini.temperature=0.7
gemini.max.tokens=2048

# ??? Thymeleaf ??????????????????????????????????????????????
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# ??? CORS ???????????????????????????????????????????????????
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ??? Actuator (for GitHub Actions health checks) ?????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ??? Logging ????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.suhada.furniture=INFO

spring.main.lazy-initialization=true

